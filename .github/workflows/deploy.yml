name: Deploy to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: aimarketpulse-frontend
  ECS_CLUSTER: aimarketpulse-cluster
  ECS_SERVICE: frontend-task-service-muf4lcwi

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: AI Market Pulse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          API_URL="${NEXT_PUBLIC_API_URL:-http://aimarketpulse-alb-1476389455.eu-north-1.elb.amazonaws.com/api/v1}"
          [ -z "$API_URL" ] && API_URL="http://aimarketpulse-alb-1476389455.eu-north-1.elb.amazonaws.com/api/v1"
          echo "Building frontend with NEXT_PUBLIC_API_URL=$API_URL"
          docker build -f frontend/Dockerfile -t $ECR_REPOSITORY:latest \
            --build-arg NEXT_PUBLIC_API_URL="$API_URL" \
            ./frontend

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Register new task definition revision and update service
        env:
          ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:latest
        run: |
          set -e
          TASK_DEF_ARN=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$TASK_DEF_ARN" --region $AWS_REGION --query 'taskDefinition' > task-def.json
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-def.json > task-def-clean.json
          jq --arg img "$ECR_URI" '.containerDefinitions[0].image = $img' task-def-clean.json > task-def-new.json
          NEW_TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://task-def-new.json --region $AWS_REGION --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered task definition: $NEW_TASK_DEF"
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition "$NEW_TASK_DEF" --region $AWS_REGION --query 'service.deployments[0].status' --output text
