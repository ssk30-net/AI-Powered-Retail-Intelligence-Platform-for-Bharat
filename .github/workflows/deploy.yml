name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: aimarketpulse-frontend
  ECS_CLUSTER: aimarketpulse-cluster
  ECS_SERVICE: frontend-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: AI Market Pulse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify AWS secrets are set
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "::error::AWS_ACCESS_KEY_ID is not set. Add it in Settings → Secrets and variables → Actions"; exit 1; fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then echo "::error::AWS_SECRET_ACCESS_KEY is not set. Add it in Settings → Secrets and variables → Actions"; exit 1; fi
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then echo "::error::AWS_ACCOUNT_ID is not set. Add it in Settings → Secrets and variables → Actions"; exit 1; fi
          echo "Required secrets are set."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          # Set in "AI Market Pulse" env vars to override; default matches your ALB
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          API_URL="${NEXT_PUBLIC_API_URL:-http://aimarketpulse-alb-1476389455.eu-north-1.elb.amazonaws.com/api/v1}"
          docker build -f frontend/Dockerfile -t $ECR_REPOSITORY:latest \
            --build-arg NEXT_PUBLIC_API_URL="$API_URL" \
            ./frontend

      - name: Tag and push image to ECR
        env:
          ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:latest $ECR_URI
          docker push $ECR_URI